<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtlasExplorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 60px 20px;
    }
    h1 { font-size: 2.5rem; margin: 0 0 12px; color: #adffff; }
    p.subtitle { font-size: 1.1rem; color: #aaa; margin: 0 0 40px; text-align: center; max-width: 540px; }
    a.btn {
      display: inline-block;
      padding: 14px 36px;
      background: #adffff;
      color: #1a1a2e;
      font-weight: bold;
      font-size: 1rem;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s;
    }
    a.btn:hover { background: #ffffff; }
    .note { margin-top: 24px; font-size: 0.85rem; color: #777; }
  </style>
</head>
<body>
  <h1>AtlasExplorer</h1>
  <p class="subtitle">
    A powerful file explorer with category tagging, change detection,
    integrated notes, and a multi-panel layout — built with Electron.
  </p>
  <a class="btn" href="app/">Launch Interactive Demo</a>
  <p class="note">Runs entirely in your browser &mdash; no install required. Session resets when you close the tab.</p>
</body>
</html>
